name: Generate WARP Config
on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Install wireguard-tools
        run: sudo apt-get update && sudo apt-get install -y wireguard-tools jq curl

      - name: Generate keypair
        id: keys
        run: |
          PRIVATE=$(wg genkey)
          PUBLIC=$(echo "$PRIVATE" | wg pubkey)
          echo "private=$PRIVATE" >> $GITHUB_OUTPUT
          echo "public=$PUBLIC" >> $GITHUB_OUTPUT

      - name: Register with Cloudflare WARP
        run: |
          RESPONSE=$(curl -s -X POST "https://api.cloudflareclient.com/v0a2158/reg" \
            -H "Content-Type: application/json" \
            -H "User-Agent: okhttp/3.12.1" \
            -d "{\"key\":\"${{ steps.keys.outputs.public }}\",\"install_id\":\"\",\"fcm_token\":\"\",\"tos\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\",\"type\":\"Android\",\"locale\":\"en_US\"}")
          echo "$RESPONSE" > warp_response.json
          cat warp_response.json

      - name: Build client config
        run: |
          CLIENT_IPV4=$(jq -r '.result.config.interface.addresses.v4' warp_response.json)
          CLIENT_IPV6=$(jq -r '.result.config.interface.addresses.v6' warp_response.json)
          PEER_PUBLIC=$(jq -r '.result.config.peers[0].public_key' warp_response.json)
          ENDPOINT_HOST=$(jq -r '.result.config.peers[0].endpoint.host' warp_response.json)
          cat <<EOF > wgclient.conf
          [Interface]
          PrivateKey = ${{ steps.keys.outputs.private }}
          Address = $CLIENT_IPV4/32, $CLIENT_IPV6/128
          DNS = 1.1.1.1

          [Peer]
          PublicKey = $PEER_PUBLIC
          Endpoint = $ENDPOINT_HOST
          AllowedIPs = 0.0.0.0/0, ::/0
          EOF
          cat wgclient.conf

      - name: Upload config
        uses: actions/upload-artifact@v4
        with:
          name: warp-client-config
          path: wgclient.conf
