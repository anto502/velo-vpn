name: Build Android APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Add Android platform
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Generate app icons
        run: npx capacitor-assets generate --android --iconBackgroundColor "#0b1120" --iconBackgroundColorDark "#0b1120"

      - name: Copy VeloVpnPlugin into Android project
        run: |
          mkdir -p android/app/src/main/java/com/anto502/velovpn
          cp native/VeloVpnPlugin.kt android/app/src/main/java/com/anto502/velovpn/VeloVpnPlugin.kt
      - name: Bump minSdkVersion for WireGuard
        run: |
          sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 24/' android/variables.gradle

      - name: Add WireGuard dependency to app build.gradle
        run: |
          GRADLE=android/app/build.gradle
          awk '{print} /^dependencies {/ && !x {print "    implementation \x27com.wireguard.android:tunnel:1.0.20260102\x27"; x=1}' "$GRADLE" > tmp_gradle.gradle
          mv tmp_gradle.gradle "$GRADLE"

      - name: Add JitPack repository (for Orbot-IPtProxy)
        run: |
          # Capacitor 6 / AGP 8 projects put repository declarations in
          # settings.gradle (dependencyResolutionManagement), NOT build.gradle.
          # Patch whichever of these files actually declares a repositories {}
          # block, so JitPack is visible wherever Gradle is actually looking.
          for PROJECT_GRADLE in android/settings.gradle android/build.gradle; do
            if [ -f "$PROJECT_GRADLE" ] && ! grep -q "jitpack.io" "$PROJECT_GRADLE"; then
              awk '{print} /repositories {/{print "        maven { url \x27https://jitpack.io\x27 }"}' "$PROJECT_GRADLE" > tmp_gradle.gradle
              mv tmp_gradle.gradle "$PROJECT_GRADLE"
            fi
          done
          echo "---- settings.gradle ----"
          cat android/settings.gradle 2>/dev/null || echo "(no settings.gradle)"
          echo "---- build.gradle ----"
          cat android/build.gradle

      - name: Add Tor/IPtProxy dependencies to app build.gradle
        run: |
          GRADLE=android/app/build.gradle
          awk '{print} /^dependencies {/ && !x {
            print "    implementation \x27info.guardianproject:tor-android:0.4.8.7\x27";
            print "    implementation \x27info.guardianproject:jtorctl:0.4.5.7\x27";
            print "    implementation \x27com.github.guardianproject:Orbot-IPtProxy:0.1.0\x27";
            x=1
          }' "$GRADLE" > tmp_gradle.gradle
          mv tmp_gradle.gradle "$GRADLE"
      - name: Add Kotlin support to Android project
        run: |
          PROJECT_GRADLE=android/build.gradle
          if ! grep -q "kotlin-gradle-plugin" "$PROJECT_GRADLE"; then
            sed -i "/classpath 'com.android.tools.build:gradle/a\\        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'" "$PROJECT_GRADLE"
          fi

          APP_GRADLE=android/app/build.gradle
          if ! grep -q "kotlin-android" "$APP_GRADLE"; then
            sed -i "0,/apply plugin: 'com.android.application'/s//apply plugin: 'com.android.application'\\napply plugin: 'kotlin-android'/" "$APP_GRADLE"
          fi
          if ! grep -q "kotlin-stdlib" "$APP_GRADLE"; then
            sed -i "/^dependencies {/a\\    implementation \"org.jetbrains.kotlin:kotlin-stdlib:1.9.24\"" "$APP_GRADLE"
          fi

      - name: Register VeloVpnPlugin in MainActivity
        run: |
          MAIN=android/app/src/main/java/com/anto502/velovpn/MainActivity.java
          printf '%s\n' \
            'package com.anto502.velovpn;' \
            '' \
            'import android.os.Bundle;' \
            'import com.getcapacitor.BridgeActivity;' \
            '' \
            'public class MainActivity extends BridgeActivity {' \
            '    @Override' \
            '    public void onCreate(Bundle savedInstanceState) {' \
            '        registerPlugin(VeloVpnPlugin.class);' \
            '        super.onCreate(savedInstanceState);' \
            '    }' \
            '}' \
            > "$MAIN"

      

      - name: Add AdMob App ID to AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          awk '{if (/<\/application>/ && !x) {print "    <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"ca-app-pub-4219488272694103~5061285797\"/>"; x=1} print}' "$MANIFEST" > tmp_manifest.xml
          mv tmp_manifest.xml "$MANIFEST"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: velo-vpn-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
